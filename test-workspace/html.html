<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Theme preview — HTML syntax showcase" />
  <title>HTML Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="/styles/main.css" />
  <style>
    /* Embedded CSS */
    :root {
      --color-bg:      #0f0f1c;
      --color-surface: #1a1a2e;
      --color-accent:  #09fbd3;
      --color-text:    #d0d4e8;
      --radius:        8px;
      --transition:    200ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      color:      var(--color-text);
      font-family: 'DM Sans', system-ui, sans-serif;
      line-height: 1.6;
    }

    .card {
      background:    var(--color-surface);
      border:        1px solid rgba(255 255 255 / 0.08);
      border-radius: var(--radius);
      padding:       1.5rem;
      transition:    transform var(--transition), box-shadow var(--transition);
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0 0 0 / 0.4); }

    @media (prefers-color-scheme: light) {
      :root { --color-bg: #f8f9fc; --color-text: #1a1a2e; }
    }
  </style>
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="site-header" role="banner">
    <nav aria-label="Primary navigation">
      <a class="nav-logo" href="/">
        <img src="/images/logo.svg" alt="altText" width="32" height="32" />
        <span>Text Preview</span>
      </a>
      <ul class="nav-links" role="list">
        <li><a href="/themes"    class="nav-link">Themes</a></li>
        <li><a href="/docs"      class="nav-link">Docs</a></li>
        <li><a href="/community" class="nav-link" aria-current="page">Community</a></li>
      </ul>
      <button class="btn btn--icon" aria-label="Toggle theme" data-action="toggle-theme">
        <svg aria-hidden="true" viewBox="0 0 24 24" width="20" height="20">
          <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
      </button>
    </nav>
  </header>

  <!-- ── Main content ───────────────────────────────────────────────────── -->
  <main id="main" role="main">
    <section class="hero" aria-labelledby="hero-heading">
      <h1 id="hero-heading">Generate stunning VS&nbsp;Code themes</h1>
      <p class="hero__sub">Pick a palette. Get a publish-ready extension in seconds.</p>

      <form class="palette-form" action="/generate" method="POST" novalidate>
        <fieldset>
          <legend>Choose your palette</legend>

          <div class="color-inputs">
            <label for="color-1">Primary</label>
            <input type="color" id="color-1" name="colors[]" value="#6b17e6" />

            <label for="color-2">Accent</label>
            <input type="color" id="color-2" name="colors[]" value="#09fbd3" />

            <label for="color-3">Background</label>
            <input type="color" id="color-3" name="colors[]" value="#0f0f1c" />
          </div>

          <label for="theme-name">Theme name</label>
          <input
            type="text"
            id="theme-name"
            name="name"
            placeholder="My Awesome Theme"
            maxlength="64"
            required
            autocomplete="off"
            pattern="[A-Za-z0-9 \-]+"
          />

          <label for="mode">Generation mode</label>
          <select id="mode" name="mode">
            <option value="custom"       selected>Custom palette</option>
            <option value="random">      Random</option>
            <option value="personalized">Personalized</option>
          </select>
        </fieldset>

        <button type="submit" class="btn btn--primary">
          ⚡ Generate
        </button>
      </form>
    </section>

    <!-- Theme cards -->
    <section aria-labelledby="gallery-heading">
      <h2 id="gallery-heading">Community themes</h2>
      <ul class="theme-gallery" role="list">
        <li>
          <article class="card theme-card" data-theme-id="neon-vomit-night">
            <div class="theme-card__preview" aria-hidden="true">
              <span class="dot" style="background:#070425"></span>
              <span class="dot" style="background:#9900ff"></span>
              <span class="dot" style="background:#09fbd3"></span>
            </div>
            <h3 class="theme-card__name">Neon Vomit Night</h3>
            <p class="theme-card__author">by <a href="https://github.com/Steven-Wiener">Steven Wiener</a></p>
            <div class="theme-card__actions">
              <a href="https://github.com/Steven-Wiener/Visual-Studio-Code-Themes/tree/main/neon-vomit-night" class="btn btn--sm">View</a>
              <button class="btn btn--sm btn--outline" data-action="install" data-id="neon-vomit-night">
                Install
              </button>
            </div>
          </article>
        </li>
      </ul>
    </section>
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer role="contentinfo">
    <small>© 2025 Steven Wiener &mdash; MIT License</small>
  </footer>

  <!-- ── Scripts ────────────────────────────────────────────────────────── -->
  <script type="module">
    // Toggle theme
    document.querySelector('[data-action="toggle-theme"]')?.addEventListener('click', () => {
      const current = document.documentElement.dataset.theme ?? 'dark';
      document.documentElement.dataset.theme = current === 'dark' ? 'light' : 'dark';
    });

    // Install buttons
    document.querySelectorAll('[data-action="install"]').forEach(btn => {
      btn.addEventListener('click', async ({ currentTarget }) => {
        const id = currentTarget.dataset.id;
        currentTarget.disabled = true;
        currentTarget.textContent = 'Installing…';
        try {
          await fetch(`/api/install/${id}`, { method: 'POST' });
          currentTarget.textContent = '✓ Installed';
        } catch {
          currentTarget.textContent = 'Failed';
          currentTarget.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
